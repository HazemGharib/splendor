<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Embedded font -->
  <style>
    @font-face {
      font-family: 'Press Gutenberg';
      src: url('/fonts/Press Gutenberg.ttf') format('truetype');
    }
  </style>
  
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0a0a0f" rx="8"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold gradient for the S -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shine effect -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" fill="url(#bgGrad)" rx="8"/>
  
  <!-- Elegant serif S with Press Gutenberg font -->
  <text 
    x="50" 
    y="72" 
    font-size="70" 
    fill="url(#goldGrad)" 
    text-anchor="middle" 
    font-weight="700" 
    font-family="'Press Gutenberg', Georgia, serif"
    style="filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.6))">S</text>
  
  <!-- Subtle shine overlay on top half -->
  <rect width="100" height="50" fill="url(#shineGrad)" rx="8"/>
</svg>
